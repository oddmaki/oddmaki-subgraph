name: Deploy Subgraph

on:
  workflow_dispatch:
    inputs:
      network:
        description: Target network
        required: true
        type: choice
        options:
          - base-sepolia
          - base
      version:
        description: "Version label (e.g. 1.2.0). Leave empty to use the package.json version."
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.network }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm codegen

      - run: pnpm build

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying **$VERSION** to **${{ inputs.network }}**" >> "$GITHUB_STEP_SUMMARY"

      - name: Authenticate with Graph Studio
        env:
          GRAPH_DEPLOY_KEY: ${{ secrets.GRAPH_DEPLOY_KEY }}
        run: pnpm exec graph auth "$GRAPH_DEPLOY_KEY"

      - name: Deploy
        run: |
          VERSION=${{ steps.version.outputs.value }} pnpm deploy-${{ inputs.network }}
