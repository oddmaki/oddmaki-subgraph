name: Deploy Subgraph

on:
  workflow_dispatch:
    inputs:
      network:
        description: Target network
        required: true
        type: choice
        options:
          - base-sepolia
          - base
      version:
        description: "Version label (e.g. v1.2.0). Leave empty to auto-increment patch."
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.network }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need tags for auto-increment

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm codegen

      - run: pnpm build

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            # Find latest tag for this network and bump patch
            LATEST=$(git tag -l "deploy/${{ inputs.network }}/v*" --sort=-v:refname | head -n1)
            if [ -z "$LATEST" ]; then
              # No prior deploy tag — fall back to script defaults
              if [ "${{ inputs.network }}" = "base-sepolia" ]; then
                VERSION="v1.1.0"
              else
                VERSION="v1.0.0"
              fi
            else
              # Strip prefix: deploy/base-sepolia/v1.2.3 -> 1.2.3
              SEMVER="${LATEST##*/v}"
              MAJOR="${SEMVER%%.*}"
              REST="${SEMVER#*.}"
              MINOR="${REST%%.*}"
              PATCH="${REST#*.}"
              PATCH=$((PATCH + 1))
              VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying **$VERSION** to **${{ inputs.network }}**" >> "$GITHUB_STEP_SUMMARY"

      - name: Authenticate with Graph Studio
        run: graph auth "${{ secrets.GRAPH_DEPLOY_KEY }}"

      - name: Deploy
        run: |
          VERSION=${{ steps.version.outputs.value }} pnpm deploy-${{ inputs.network }}

      - name: Tag deployment
        run: |
          git tag "deploy/${{ inputs.network }}/${{ steps.version.outputs.value }}"
          git push origin "deploy/${{ inputs.network }}/${{ steps.version.outputs.value }}"
